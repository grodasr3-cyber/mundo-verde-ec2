name: Deploy a AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código
      uses: actions/checkout@v4

    - name: Subir a EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: 3.144.128.116
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        source: "index.html"
        target: "/var/www/html/"
